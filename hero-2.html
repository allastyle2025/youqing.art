<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>有情 - 英雄区域 v2</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.loli.net/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2D1B1B',
                        secondary: '#6B4423',
                        accent: '#D4A574',
                        light: '#FAFAFA',
                        soft: '#F5F1ED',
                        dark: '#1A1A1A',
                    },
                    fontFamily: {
                        display: ['"Playfair Display"', 'serif'],
                        body: ['"Inter"', 'sans-serif']
                    },
                },
            }
        }
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html {
            scroll-behavior: smooth;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            background: #FAFAFA;
            color: #1A1A1A;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .animate-fade-in {
            animation: fadeInUp 0.8s ease-out forwards;
            opacity: 0;
        }
        
        .animate-slide-left {
            animation: slideInLeft 0.8s ease-out forwards;
            opacity: 0;
        }
        
        .animate-slide-up {
            animation: slideInUp 0.8s ease-out forwards;
            opacity: 0;
        }
        
        .hero-image {
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        
        .content-overlay {
            background: linear-gradient(135deg, rgba(45, 27, 27, 0.85) 0%, rgba(45, 27, 27, 0.6) 50%, rgba(107, 68, 35, 0.7) 100%);
        }

        .hidden{
            display: none;
        }
    </style>
</head>
<body>
    <!-- 英雄区域 v2 - 全屏图片背景 -->
    <section class="relative w-full h-screen overflow-hidden flex items-center justify-center">
        <!-- 背景图片 -->
        <div class="absolute inset-0 hero-image" style="background-image: url('https://pic1.imgdb.cn/item/694548bc2ce92a4f93126ac1.jpg');"></div>
        
        <!-- 内容覆盖层 -->
        <div class="absolute inset-0 content-overlay"></div>
        
        <!-- 内容容器 -->
        <div class="relative z-10 container mx-auto px-4 sm:px-6 h-full flex flex-col justify-center items-center md:items-start pb-24 md:pb-0">
            <div class="max-w-2xl w-full scale-95 sm:scale-100 md:scale-100 origin-top md:origin-center pt-24">
                
                <!-- 主标题 -->
                <h1 class="text-4xl sm:text-8xl md:text-8xl lg:text-8xl font-display font-bold text-white leading-tight mb-2 md:mb-6 animate-slide-left" style="animation-delay: 0.3s; text-shadow: 0 4px 20px rgba(0,0,0,0.5);">
                    众生<br/>有情
                </h1>
                
                <!-- 副标题 -->
                <p class="text-sm md:text-lg text-accent/90 font-medium mb-8 md:mb-10 max-w-xl animate-slide-left" style="animation-delay: 0.4s">
                    一场献给地球的舞作
                </p>
                <p class="mb-24 md:mb-0"></p>
                <!-- 描述文本 -->
                <p class="text-xs sm:text-sm md:text-base text-white/85 leading-relaxed mb-8 md:mb-16 max-w-xs sm:max-w-lg font-light animate-slide-up" style="animation-delay: 0.5s">
                    以「美好新地球」为蓝图的生态舞作，一次天南海北的素人舞者自发汇集的艺术行动
                </p>
                
                <!-- 按钮组 -->
                <div class="hidden flex flex-wrap gap-2 sm:gap-4 animate-slide-up" style="animation-delay: 0.6s">
                    <a href="index.html#about" class="group px-5 sm:px-8 py-2.5 sm:py-3 bg-accent text-primary rounded-lg font-semibold text-sm sm:text-base hover:bg-white transition-all duration-300 shadow-lg hover:shadow-2xl transform hover:scale-105 flex items-center gap-2">
                        了解更多
                        <i class="fa fa-arrow-right group-hover:translate-x-1 transition-transform duration-300"></i>
                    </a>
                    <a href="index.html#contact" class="px-5 sm:px-8 py-2.5 sm:py-3 border-2 border-white text-white rounded-lg font-semibold text-sm sm:text-base hover:bg-white/10 backdrop-blur-sm transition-all duration-300 transform hover:scale-105">
                        联系我们
                    </a>
                </div>
                
                <!-- 统计信息 -->
                <div class="mt-20 md:mt-16 pt-12 md:pt-6 border-t border-white/20 grid grid-cols-3 md:grid-cols-3 gap-4 md:gap-8 animate-fade-in" style="animation-delay: 0.7s">
                    <div class="text-center md:text-left">
                        <div class="text-2xl sm:text-3xl md:text-4xl font-display font-bold text-accent mb-1 md:mb-2">30+</div>
                        <p class="text-xs md:text-sm text-white/70">位素人舞者</p>
                    </div>
                    <div class="text-center md:text-left">
                        <div class="text-2xl sm:text-3xl md:text-4xl font-display font-bold text-accent mb-1 md:mb-2">2026</div>
                        <p class="text-xs md:text-sm text-white/70">年度演出</p>
                    </div>
                    <div class="text-center md:text-left">
                        <div class="text-2xl sm:text-3xl md:text-4xl font-display font-bold text-accent mb-1 md:mb-2">∞</div>
                        <p class="text-xs md:text-sm text-white/70">无限可能</p>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 左上角装饰 -->
        <div class="absolute top-24 left-6 md:left-12 w-1 h-20 bg-gradient-to-b from-accent to-transparent opacity-60"></div>
        
        <!-- 右下角装饰 -->
        <div class="absolute bottom-20 right-6 md:right-12 w-1 h-20 bg-gradient-to-t from-accent to-transparent opacity-60"></div>
        
        <!-- 向下滚动指示器 -->
        <div class="absolute bottom-6 md:bottom-8 left-1/2 -translate-x-1/2 z-20 animate-bounce">
            <div class="flex flex-col items-center gap-2 text-white/60 hover:text-white transition-colors cursor-pointer" onclick="document.querySelector('#about')?.scrollIntoView({behavior: 'smooth'})">
                <span class="text-xs font-medium">向下探索</span>
                <i class="fa fa-chevron-down text-base"></i>
            </div>
        </div>
    </section>
</body>
</html>
