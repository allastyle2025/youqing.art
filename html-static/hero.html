<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>有情 - 英雄区域</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2D1B1B',
                        secondary: '#6B4423',
                        accent: '#D4A574',
                        light: '#FAFAFA',
                        soft: '#F5F1ED',
                        dark: '#1A1A1A',
                    },
                    fontFamily: {
                        display: ['"Playfair Display"', 'serif'],
                        body: ['"Inter"', 'sans-serif']
                    },
                },
            }
        }
    </script>

    <!-- 百度站点统计 -->
    <script>
        var _hmt = _hmt || [];
        (function() {
            var hm = document.createElement("script");
            hm.src = "https://hm.baidu.com/hm.js?af9e93cf0819c6c3f8adb5f88c8a3ee0";
            var s = document.getElementsByTagName("script")[0]; 
            s.parentNode.insertBefore(hm, s);
        })();
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html {
            scroll-behavior: smooth;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            background: #FAFAFA;
            color: #1A1A1A;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .animate-fade-in {
            animation: fadeInUp 0.8s ease-out forwards;
            opacity: 0;
        }
    </style>
</head>
<body>
    <!-- 英雄区域 - 全屏 -->
    <section class="relative w-full h-screen bg-gradient-to-br from-primary via-primary/95 to-secondary flex items-center justify-center overflow-hidden">
        <!-- 背景装饰元素 -->
        <div class="absolute inset-0 opacity-20">
            <div class="absolute top-10 right-10 w-96 h-96 bg-accent rounded-full blur-3xl"></div>
            <div class="absolute bottom-0 left-0 w-96 h-96 bg-accent rounded-full blur-3xl"></div>
        </div>
        
        <!-- 内容容器 -->
        <div class="relative z-10 container mx-auto px-6 py-20 md:py-0">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 md:gap-16 items-center h-screen md:h-auto md:min-h-[calc(100vh-80px)]">
                <!-- 左侧文本 -->
                <div class="flex flex-col justify-center animate-fade-in">
                    <div class="mb-8 md:mb-10">
                        <span class="inline-block px-4 py-2 bg-white/20 text-accent text-xs font-semibold rounded-full mb-6 backdrop-blur-sm border border-accent/30">素人共创生态舞作</span>
                        <h1 class="text-5xl sm:text-6xl md:text-7xl font-display font-bold text-white leading-tight mb-4">
                            众生<br/>有情
                        </h1>
                        <p class="text-sm md:text-base text-accent/80 font-medium mt-2">20位素人舞者 · 一场无专业限制的舞作</p>
                    </div>
                    <p class="text-base md:text-lg text-white/90 mb-10 leading-relaxed max-w-lg font-light">
                        用身体语言传递对地球的关切与爱。这是一个没有任何资助的自发项目，来自各行各业的素人舞者共同创作与呈现。
                    </p>
                    <div class="flex flex-wrap gap-4 pt-4">
                        <a href="index.html#about" class="px-8 py-3 bg-accent text-primary rounded-full font-semibold hover:bg-white transition-colors duration-300 shadow-lg hover:shadow-xl">
                            了解更多
                        </a>
                        <a href="index.html#contact" class="px-8 py-3 border-2 border-white text-white rounded-full font-semibold hover:bg-white/10 transition-colors duration-300 backdrop-blur-sm">
                            联系我们
                        </a>
                    </div>
                </div>
                
                <!-- 右侧图片 -->
                <div class="relative hidden md:block animate-fade-in" style="animation-delay: 0.2s">
                    <div class="relative h-96 md:h-full max-h-screen">
                        <img 
                            src="https://pic1.imgdb.cn/item/694548bc2ce92a4f93126ac1.jpg" 
                            alt="有情舞者" 
                            class="w-full h-full object-cover rounded-3xl shadow-2xl"
                        >
                        <!-- 覆盖层 -->
                        <div class="absolute inset-0 bg-gradient-to-t from-primary/40 to-transparent rounded-3xl"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 向下滚动指示器 -->
        <div class="absolute bottom-8 left-1/2 -translate-x-1/2 z-20 animate-bounce">
            <div class="flex flex-col items-center gap-2 text-white/70">
                <span class="text-xs font-medium">向下滚动</span>
                <i class="fa fa-chevron-down text-lg"></i>
            </div>
        </div>
    </section>
</body>
</html>
