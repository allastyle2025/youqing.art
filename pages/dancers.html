<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>舞者 - 有情</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- 自定义样式 -->
    <link rel="stylesheet" href="../css/style.css">
    
    <!-- Tailwind 配置 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2D1B1B',
                        secondary: '#6B4423',
                        accent: '#D4A574',
                        light: '#FAFAFA',
                        soft: '#F5F1ED',
                        dark: '#1A1A1A',
                    },
                    fontFamily: {
                        display: ['"Playfair Display"', 'serif'],
                        body: ['"Inter"', 'sans-serif']
                    },
                },
            }
        }
    </script>
</head>
<body class="font-body text-dark bg-light">
    <!-- 导航栏 -->
    <header id="navbar" class="fixed top-0 left-0 right-0 z-50 bg-primary transition-all duration-300">
        <nav class="container mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <a href="../index.html" class="flex items-center gap-3 hover:opacity-80 transition-opacity">
                    <img src="../assets/images/youqing_logo.png" alt="有情 Logo" class="h-9 w-9">
                    <span class="text-xl font-display font-bold text-white">有情</span>
                </a>
            </div>
            
            <!-- 桌面导航 -->
            <div class="hidden md:flex items-center gap-12">
                <a href="../index.html#about" class="text-sm font-medium text-white/70 hover:text-accent transition-colors duration-300">关于</a>
                <a href="../pages/gallery.html" class="text-sm font-medium text-white/70 hover:text-accent transition-colors duration-300">画廊</a>
                <a href="../pages/dancers.html" class="text-sm font-medium text-accent">舞者</a>
                <a href="../index.html#schedule" class="text-sm font-medium text-white/70 hover:text-accent transition-colors duration-300">历程</a>
                <a href="../pages/testimonials.html" class="text-sm font-medium text-white/70 hover:text-accent transition-colors duration-300">舞者心语</a>
                <a href="../index.html#contact" class="px-6 py-2 bg-secondary text-white rounded-full text-sm font-medium hover:bg-primary transition-colors duration-300">联系</a>
            </div>
            
            <!-- 移动菜单按钮 -->
            <button id="mobile-menu-btn" class="md:hidden text-lg text-white transition-colors duration-300">
                <i class="fa fa-bars"></i>
            </button>
        </nav>
    </header>

    <!-- 移动菜单 -->
    <div id="mobile-menu" class="hidden md:hidden fixed inset-0 top-16 z-40 bg-white">
        <div class="flex flex-col space-y-6 p-6">
            <a href="../index.html#about" class="text-base font-medium text-dark">关于</a>
            <a href="../pages/gallery.html" class="text-base font-medium text-dark">画廊</a>
            <a href="../pages/dancers.html" class="text-base font-medium text-dark">舞者</a>
            <a href="../index.html#schedule" class="text-base font-medium text-dark">历程</a>
            <a href="../pages/testimonials.html" class="text-base font-medium text-dark">舞者心语</a>
            <a href="../index.html#contact" class="px-4 py-2 bg-primary text-white rounded-full text-center inline-block">联系我们</a>
        </div>
    </div>

    <!-- 页面标题区 -->
    <div class="pt-32 pb-20 bg-gradient-to-b from-primary to-secondary">
        <div class="container mx-auto px-6 text-center">
            <h1 class="text-5xl md:text-6xl font-display font-bold text-white mb-6">素人共创舞作《有情》项目成员</h1>
            <div class="flex justify-center mb-6">
                <div class="w-24 h-1 bg-accent"></div>
            </div>
            <p class="text-xl text-white/80">来自不同领域的素人舞者，用身体讲述属于自己的故事</p>
        </div>
    </div>

    <!-- 舞者网格 -->
    <section class="py-24 bg-light">
        <div class="container mx-auto px-6">
            <div id="dancers-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- 将由 JavaScript 填充 -->
            </div>
        </div>
    </section>

    <!-- 联系区域 -->
    <section id="contact" class="py-24 bg-primary text-white">
        <div class="container mx-auto px-6 text-center">
            <h2 class="text-4xl font-display font-bold mb-6">成为舞者</h2>
            <p class="text-xl text-white/80 mb-12 max-w-2xl mx-auto">
                无论你是舞者、摄影师、音乐人、设计师，或是对艺术和生态感兴趣的朋友，我们都欢迎你的加入。
            </p>
            <a href="mailto:contact@youqing.art" class="inline-block px-10 py-4 bg-accent text-primary font-semibold rounded-full hover:bg-white transition-colors duration-300">
                联系我们
            </a>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="bg-dark text-white/60 py-12">
        <div class="container mx-auto px-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-12 mb-12">
                <div>
                    <h3 class="text-white font-display font-bold mb-4">有情</h3>
                    <p class="text-sm leading-relaxed">
                        一个素人共创的生态舞蹈项目，连接人、社区与自然。
                    </p>
                </div>
                <div>
                    <h3 class="text-white font-semibold mb-4">快速链接</h3>
                    <ul class="text-sm space-y-2">
                        <li><a href="../index.html#about" class="text-white/60 hover:text-white transition-colors">关于</a></li>
                        <li><a href="../pages/gallery.html" class="text-white/60 hover:text-white transition-colors">画廊</a></li>
                        <li><a href="../index.html#dancers" class="text-white/60 hover:text-white transition-colors">舞者</a></li>
                        <li><a href="../index.html#schedule" class="text-white/60 hover:text-white transition-colors">历程</a></li>
                    </ul>
                </div>
                <div>
                    <h3 class="text-white font-semibold mb-4">跟随我们</h3>
                    <div class="flex gap-4">
                        <a href="#" class="text-white/60 hover:text-accent transition-colors text-lg">
                            <i class="fa fa-instagram"></i>
                        </a>
                        <a href="#" class="text-white/60 hover:text-accent transition-colors text-lg">
                            <i class="fa fa-weibo"></i>
                        </a>
                        <a href="#" class="text-white/60 hover:text-accent transition-colors text-lg">
                            <i class="fa fa-wechat"></i>
                        </a>
                    </div>
                </div>
            </div>
            <div class="border-t border-white/10 pt-8 text-center text-sm">
                <p>&copy; 2024 有情. 所有权利保留。</p>
            </div>
        </div>
    </footer>

    <script>
        const CDN_BASE_URL = 'https://cdn.djybrs.cn/uploads/youqing/dance-portrait/';

        // 加载舞者数据
        async function loadDancers() {
            try {
                const response = await fetch('../data/dancers.json');
                const dancers = await response.json();
                renderDancers(dancers);
            } catch (error) {
                console.error('加载舞者数据失败:', error);
            }
        }

        // 渲染舞者卡片
        function renderDancers(dancers) {
            const grid = document.getElementById('dancers-grid');
            grid.innerHTML = dancers.map(dancer => `
                <div class="group hover-lift bg-white rounded-xl overflow-hidden shadow-sm hover:shadow-lg transition-shadow duration-300">
                    <div class="relative h-80 overflow-hidden bg-gray-200">
                        <img 
                            src="${CDN_BASE_URL}${dancer.image}" 
                            alt="${dancer.name}" 
                            class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"
                            onerror="this.src='../assets/images/placeholder.jpg'"
                        >
                        <div class="absolute inset-0 bg-gradient-to-t from-black/30 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                    </div>
                    <div class="p-6">
                        <div class="mb-3">
                            <h3 class="text-xl font-display font-bold text-primary">${dancer.name}</h3>
                            ${dancer.fullName ? `<p class="text-xs text-gray-500">${dancer.fullName}</p>` : ''}
                        </div>
                        ${dancer.age || dancer.location ? `<p class="text-xs text-gray-500 mb-2">${dancer.age ? dancer.age : ''}${dancer.age && dancer.location ? ', ' : ''}${dancer.location ? dancer.location : ''}</p>` : ''}
                        <p class="text-sm text-accent font-semibold mb-3">${dancer.profession}</p>
                        <div class="border-t border-gray-100 pt-3">
                            <p class="text-gray-700 italic text-sm leading-relaxed">
                                "${dancer.quote}"
                            </p>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', loadDancers);

        // 移动菜单切换
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        if (mobileMenuBtn) {
            mobileMenuBtn.addEventListener('click', () => {
                const menu = document.getElementById('mobile-menu');
                if (menu) {
                    menu.classList.toggle('hidden');
                }
            });
        }
    </script>
</body>
</html>
