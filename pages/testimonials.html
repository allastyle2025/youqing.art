<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>舞者心得 - 有情</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- 自定义样式 -->
    <link rel="stylesheet" href="../css/style.css">
    
    <!-- Tailwind 配置 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2D1B1B',
                        secondary: '#6B4423',
                        accent: '#D4A574',
                        light: '#FAFAFA',
                        soft: '#F5F1ED',
                        dark: '#1A1A1A',
                    },
                    fontFamily: {
                        display: ['"Playfair Display"', 'serif'],
                        body: ['"Inter"', 'sans-serif']
                    },
                },
            }
        }
    </script>
</head>
<body class="font-body text-dark bg-light">
    <!-- 导航栏 -->
    <header id="navbar" class="fixed top-0 left-0 right-0 z-50 bg-white/95 backdrop-blur-sm border-b border-gray-100 shadow-md">
        <nav class="container mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <a href="/" class="flex items-center gap-3 hover:opacity-80 transition-opacity">
                    <img src="../assets/images/youqing_logo.png" alt="有情 Logo" class="h-9 w-9">
                    <span class="text-xl font-display font-bold text-primary">有情</span>
                </a>
            </div>
            
            <!-- 桌面导航 -->
            <div class="hidden md:flex items-center gap-12">
                <a href="../index.html#about" class="text-sm font-medium text-dark hover:text-accent transition-colors">关于</a>
                <a href="../index.html#gallery" class="text-sm font-medium text-dark hover:text-accent transition-colors">作品</a>
                <a href="../index.html#dancers" class="text-sm font-medium text-dark hover:text-accent transition-colors">舞者</a>
                <a href="../pages/testimonials.html" class="text-sm font-medium text-accent border-b-2 border-accent">心得</a>
                <a href="../index.html#contact" class="px-6 py-2 bg-primary text-white rounded-full text-sm font-medium hover:bg-secondary transition-colors">联系</a>
            </div>
            
            <!-- 移动菜单按钮 -->
            <button id="mobile-menu-btn" class="md:hidden text-lg text-dark transition-colors">
                <i class="fa fa-bars"></i>
            </button>
        </nav>
    </header>

    <!-- 移动菜单 -->
    <div id="mobile-menu" class="hidden md:hidden fixed inset-0 top-16 z-40 bg-white">
        <div class="flex flex-col space-y-6 p-6">
            <a href="../index.html#about" class="text-base font-medium text-dark">关于</a>
            <a href="../index.html#gallery" class="text-base font-medium text-dark">作品</a>
            <a href="../index.html#dancers" class="text-base font-medium text-dark">舞者</a>
            <a href="../pages/testimonials.html" class="text-base font-medium text-accent">心得</a>
            <a href="../index.html#contact" class="px-4 py-2 bg-primary text-white rounded-full text-center inline-block">联系我们</a>
        </div>
    </div>

    <!-- 主要内容 -->
    <main class="pt-24 pb-12">
        <!-- 页面标题 -->
        <section class="py-12 md:py-16 bg-soft">
            <div class="container mx-auto px-6">
                <div class="max-w-3xl mx-auto text-center">
                    <h1 class="text-4xl md:text-5xl font-display font-bold text-primary mb-6">舞者心得</h1>
                    <div class="line-separator mb-6 mx-auto"></div>
                    <p class="text-lg text-gray-700 leading-relaxed">
                        来自素人舞者的真实感悟与心路历程，记录每一次身体与灵魂的对话
                    </p>
                </div>
            </div>
        </section>

        <!-- 过滤器 -->
        <section class="py-8 bg-white border-b border-gray-200">
            <div class="container mx-auto px-6">
                <div class="max-w-4xl mx-auto">
                    <div class="flex flex-col md:flex-row gap-4 items-start md:items-center justify-between">
                        <div>
                            <p class="text-sm font-medium text-gray-600 mb-3 md:mb-0">按年份/分类过滤：</p>
                        </div>
                        <div class="flex flex-wrap gap-2">
                            <button class="filter-btn text-sm px-4 py-2 rounded-full bg-primary text-white hover:bg-secondary transition-colors" data-filter="all">
                                全部
                            </button>
                            <button class="filter-btn text-sm px-4 py-2 rounded-full bg-white border border-gray-300 text-dark hover:border-accent transition-colors" data-filter="2024">
                                2024年
                            </button>
                            <button class="filter-btn text-sm px-4 py-2 rounded-full bg-white border border-gray-300 text-dark hover:border-accent transition-colors" data-filter="2025">
                                2025年
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 舞者心语列表 -->
        <section class="py-16 bg-light">
            <div class="container mx-auto px-6">
                <div id="testimonials-container" class="max-w-4xl mx-auto space-y-6">
                    <!-- Testimonials will be loaded here -->
                    <div class="text-center py-12">
                        <p class="text-gray-600">正在加载中...</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- 页脚 -->
    <footer class="bg-primary text-white py-12">
        <div class="container mx-auto px-6 text-center text-sm text-white/70">
            <p>© 2025 Wing Dance Theatre. 保留所有权利。</p>
            <p class="mt-2"><a href="../index.html" class="hover:text-white transition-colors">返回首页</a></p>
        </div>
    </footer>

    <!-- JavaScript -->
    <script>
        let allTestimonials = [];

        // 加载舞者心语数据
        async function loadTestimonials() {
            try {
                const response = await fetch('../data/testimonials.json');
                const data = await response.json();
                allTestimonials = data.testimonials;
                renderTestimonials(allTestimonials);
            } catch (error) {
                console.error('加载舞者心语失败:', error);
                document.getElementById('testimonials-container').innerHTML = '<p class="text-red-600 text-center py-12">加载失败，请稍后重试</p>';
            }
        }

        // 渲染舞者心语
        function renderTestimonials(items) {
            const container = document.getElementById('testimonials-container');
            if (items.length === 0) {
                container.innerHTML = '<p class="text-gray-600 text-center py-12">暂无相关心语</p>';
                return;
            }
            
            container.innerHTML = items.map((item, index) => {
                return `
                <div class="bg-soft rounded-xl p-6 md:p-8 shadow-sm hover:shadow-md transition-all duration-300 animate-fade-in cursor-pointer group" style="animation-delay: ${index * 0.05}s" data-testimonial-id="${item.id}">
                    <div class="flex flex-col md:flex-row items-start justify-between gap-4 mb-4">
                        <div>
                            <div class="flex items-center gap-3 mb-2 flex-wrap">
                                <h3 class="text-lg md:text-xl font-display font-bold text-primary">${item.title}</h3>
                                <span class="text-xs px-2 py-1 bg-accent/10 text-secondary rounded-full">${item.year}</span>
                            </div>
                            <div class="text-sm text-gray-600 space-y-1">
                                <p><i class="fa fa-user-circle mr-1"></i><span class="font-medium text-dark">${item.name}</span></p>
                                <p><i class="fa fa-tag mr-1"></i>${item.category}</p>
                                ${item.date ? `<p><i class="fa fa-calendar mr-1"></i>${item.date}</p>` : ''}
                            </div>
                        </div>
                        <div class="flex-shrink-0">
                            <i class="fa fa-chevron-right text-accent text-xl group-hover:translate-x-1 transition-transform"></i>
                        </div>
                    </div>
                    <p class="text-sm md:text-base text-gray-700 leading-relaxed line-clamp-4">
                        ${item.content.replace(/\n\n/g, ' ')}
                    </p>
                    <div class="mt-4 pt-4 border-t border-gray-200">
                        <p class="text-xs text-gray-500">点击查看完整心语</p>
                    </div>
                </div>
            `;
            }).join('');

            // 添加点击事件以展开全文
            document.querySelectorAll('[data-testimonial-id]').forEach(card => {
                card.addEventListener('click', () => {
                    const id = parseInt(card.getAttribute('data-testimonial-id'));
                    const testimonial = allTestimonials.find(t => t.id === id);
                    if (testimonial) {
                        showTestimonialModal(testimonial);
                    }
                });
            });
        }

        // 显示舞者心语详细信息模态框
        function showTestimonialModal(testimonial) {
            const modal = document.createElement('div');
            modal.id = 'testimonial-modal';
            modal.className = 'fixed inset-0 z-50 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 overflow-y-auto';
            modal.innerHTML = `
                <div class="bg-white rounded-xl max-w-3xl w-full my-8 shadow-2xl animate-fade-in">
                    <div class="bg-primary text-white p-6 md:p-8 flex items-start justify-between gap-4">
                        <div class="flex-1">
                            <h2 class="text-2xl md:text-3xl font-display font-bold mb-2">${testimonial.title}</h2>
                            <p class="text-sm md:text-base text-white/80 space-y-1">
                                <span class="block"><span class="font-medium">舞者：</span>${testimonial.name}</span>
                                <span class="block"><span class="font-medium">分类：</span>${testimonial.category}</span>
                                <span class="block"><span class="font-medium">年份：</span>${testimonial.year}</span>
                                ${testimonial.date ? `<span class="block"><span class="font-medium">日期：</span>${testimonial.date}</span>` : ''}
                            </p>
                        </div>
                        <button id="close-testimonial-modal" class="flex-shrink-0 w-8 h-8 flex items-center justify-center text-white hover:text-accent transition-colors">
                            <i class="fa fa-times text-xl"></i>
                        </button>
                    </div>
                    <div class="p-6 md:p-8 max-h-[calc(100vh-250px)] overflow-y-auto">
                        <div class="prose prose-sm md:prose text-gray-800 leading-relaxed whitespace-pre-wrap">
                            ${testimonial.content}
                        </div>
                        ${testimonial.link ? `
                        <div class="mt-8 pt-6 border-t border-gray-200">
                            <a href="${testimonial.link}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-2 text-accent hover:underline font-medium">
                                查看原文 <i class="fa fa-external-link text-sm"></i>
                            </a>
                        </div>
                        ` : ''}
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            document.body.style.overflow = 'hidden';

            document.getElementById('close-testimonial-modal').addEventListener('click', () => {
                modal.remove();
                document.body.style.overflow = 'auto';
            });

            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.remove();
                    document.body.style.overflow = 'auto';
                }
            });
        }

        // 过滤功能
        function filterTestimonials(year) {
            if (year === 'all') {
                renderTestimonials(allTestimonials);
            } else {
                const filtered = allTestimonials.filter(t => t.year === year);
                renderTestimonials(filtered);
            }
        }

        // 页面加载时执行
        document.addEventListener('DOMContentLoaded', function() {
            loadTestimonials();

            // 过滤按钮事件
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => {
                        b.classList.remove('bg-primary', 'text-white');
                        b.classList.add('bg-white', 'border', 'border-gray-300', 'text-dark');
                    });
                    btn.classList.remove('bg-white', 'border', 'border-gray-300', 'text-dark');
                    btn.classList.add('bg-primary', 'text-white');
                    
                    const filter = btn.getAttribute('data-filter');
                    filterTestimonials(filter);
                });
            });

            // 移动菜单
            document.getElementById('mobile-menu-btn').addEventListener('click', function() {
                document.getElementById('mobile-menu').classList.toggle('hidden');
            });
        });
    </script>
</body>
</html>
