<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>画廊 - 有情</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.loli.net/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- 自定义样式 -->
    <link rel="stylesheet" href="../css/style.css">
    
    <!-- Tailwind 配置 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2D1B1B',
                        secondary: '#6B4423',
                        accent: '#D4A574',
                        light: '#FAFAFA',
                        soft: '#F5F1ED',
                        dark: '#1A1A1A',
                    },
                    fontFamily: {
                        display: ['"Playfair Display"', 'serif'],
                        body: ['"Inter"', 'sans-serif']
                    },
                },
            }
        }
    </script>
</head>
<body class="font-body text-dark bg-light">
    <!-- 现代化导航栏 -->
    <header id="navbar" class="fixed top-0 left-0 right-0 z-50 bg-transparent transition-all duration-300">
        <nav class="container mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <a href="../index.html" class="flex items-center gap-3 hover:opacity-75 transition-opacity">
                    <img src="../assets/images/youqing_logo.png" alt="有情 Logo" class="h-9 w-9">
                    <span id="navbar-title" class="text-xl font-display font-bold text-white transition-colors duration-300">有情</span>
                </a>
            </div>
            
            <!-- 桌面导航 -->
            <div class="hidden md:flex items-center gap-12">
                <a href="../index.html#about" class="navbar-link text-sm font-medium text-white hover:text-accent transition-colors duration-300">关于</a>
                <a href="../pages/gallery.html" class="navbar-link text-sm font-medium text-white hover:text-accent transition-colors duration-300">画廊</a>
                <a href="../pages/dancers.html" class="navbar-link text-sm font-medium text-white hover:text-accent transition-colors duration-300">舞者</a>
                <a href="../index.html#schedule" class="navbar-link text-sm font-medium text-white hover:text-accent transition-colors duration-300">历程</a>
                <a href="../pages/testimonials.html" class="navbar-link text-sm font-medium text-white hover:text-accent transition-colors duration-300">舞者心语</a>
                <a href="../index.html#contact" class="px-6 py-2 bg-primary text-white rounded-full text-sm font-medium hover:bg-secondary transition-colors duration-300">联系</a>
            </div>
            
            <!-- 移动菜单按钮 -->
            <button id="mobile-menu-btn" class="md:hidden text-lg text-white navbar-icon transition-colors duration-300">
                <i class="fa fa-bars"></i>
            </button>
        </nav>
    </header>

    <!-- 移动菜单 -->
    <div id="mobile-menu" class="hidden md:hidden fixed inset-0 top-16 z-40 bg-white">
        <div class="flex flex-col space-y-6 p-6">
            <a href="../index.html#about" class="text-base font-medium text-dark">关于</a>
            <a href="../pages/gallery.html" class="text-base font-medium text-dark">画廊</a>
            <a href="../pages/dancers.html" class="text-base font-medium text-dark">舞者</a>
            <a href="../index.html#schedule" class="text-base font-medium text-dark">历程</a>
            <a href="../pages/testimonials.html" class="text-base font-medium text-dark">舞者心语</a>
            <a href="../index.html#contact" class="px-4 py-2 bg-primary text-white rounded-full text-center inline-block">联系</a>
        </div>
    </div>

    <!-- 主要内容 -->
    <div class="pt-24 pb-12">
        <!-- 相册选择部分 -->
        <section class="py-12 bg-white">
            <div class="container mx-auto px-6">
                <div class="max-w-2xl mx-auto text-center mb-12">
                    <h1 class="text-4xl md:text-5xl font-display font-bold text-primary mb-6">画廊</h1>
                    <div class="line-separator mb-6"></div>
                    <p class="text-lg text-gray-700">
                        探索我们的舞蹈作品与创作过程
                    </p>
                </div>

                <!-- 相册卡片 -->
                <div id="albums-container" class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-4xl mx-auto">
                    <!-- 相册卡片将从JSON加载 -->
                </div>
            </div>
        </section>

        <!-- 图片展示部分 -->
        <section id="images-section" class="hidden py-12 bg-soft">
            <div class="container mx-auto px-6">
                <div class="mb-8 flex items-center gap-4">
                    <button id="back-to-albums" class="flex items-center gap-2 px-4 py-2 bg-primary text-white rounded-lg hover:bg-secondary transition-colors">
                        <i class="fa fa-chevron-left"></i>
                        返回相册
                    </button>
                    <h2 id="album-title" class="text-2xl md:text-3xl font-display font-bold text-primary"></h2>
                </div>

                <div id="images-grid" class="masonry-grid">
                    <!-- 图片将从JSON加载 -->
                </div>
            </div>
        </section>
    </div>

    <!-- 图片预览灯箱 -->
    <div id="lightbox" class="hidden fixed inset-0 z-50 bg-black/95 backdrop-blur-sm flex items-center justify-center" style="touch-action: none;">
        <div class="relative w-full h-full flex flex-col items-center justify-center p-4">
            <!-- 顶部栏 -->
            <div class="absolute top-0 left-0 right-0 bg-gradient-to-b from-black/80 to-transparent px-4 md:px-6 py-3 md:py-4 flex items-center justify-between z-10">
                <div class="flex items-center gap-4 flex-1 min-w-0">
                    <h3 id="lightbox-description" class="text-base md:text-lg font-display text-white truncate">描述</h3>
                </div>
                <button id="lightbox-close" class="flex-shrink-0 w-10 h-10 md:w-12 md:h-12 flex items-center justify-center text-white text-2xl md:text-3xl hover:text-accent transition-colors ml-4">
                    <i class="fa fa-times"></i>
                </button>
            </div>
            
            <!-- 主要图片区域 -->
            <div class="relative flex-1 flex items-center justify-center max-w-7xl w-full">
                <img id="lightbox-image" src="" alt="Preview" class="max-w-full max-h-[calc(100vh-200px)] object-contain rounded-lg shadow-2xl">
                
                <!-- 上一张按钮 -->
                <button id="lightbox-prev" class="absolute left-2 md:left-6 top-1/2 -translate-y-1/2 w-12 h-12 md:w-14 md:h-14 bg-white/20 hover:bg-white/40 text-white text-2xl md:text-3xl rounded-full transition-all duration-300 flex items-center justify-center backdrop-blur-sm active:bg-white/60">
                    <i class="fa fa-chevron-left"></i>
                </button>
                
                <!-- 下一张按钮 -->
                <button id="lightbox-next" class="absolute right-2 md:right-6 top-1/2 -translate-y-1/2 w-12 h-12 md:w-14 md:h-14 bg-white/20 hover:bg-white/40 text-white text-2xl md:text-3xl rounded-full transition-all duration-300 flex items-center justify-center backdrop-blur-sm active:bg-white/60">
                    <i class="fa fa-chevron-right"></i>
                </button>
            </div>
            
            <!-- 底部信息栏 -->
            <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/80 to-transparent px-4 md:px-6 py-4 md:py-6 flex items-center justify-between z-10">
                <div class="flex-1 min-w-0">
                    <p id="lightbox-date" class="text-xs md:text-sm text-white/80">日期</p>
                </div>
                <div class="text-white text-xs md:text-sm font-medium bg-white/20 backdrop-blur-sm px-3 md:px-4 py-2 rounded-full flex-shrink-0 ml-4">
                    <span id="lightbox-counter">1 / 10</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="bg-primary text-white py-16">
        <div class="container mx-auto px-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-12 mb-12">
                <div>
                    <h3 class="text-lg font-display font-bold mb-4">有情</h3>
                    <p class="text-white/70 text-sm leading-relaxed">
                        素人共创生态舞作，用身体传递爱与关切
                    </p>
                </div>
                
                <div>
                    <h4 class="text-sm font-semibold mb-4">页面</h4>
                    <ul class="space-y-2 text-sm">
                        <li><a href="../index.html#about" class="text-white/70 hover:text-white transition-colors">关于</a></li>
                        <li><a href="../pages/gallery.html" class="text-white/70 hover:text-white transition-colors">画廊</a></li>
                        <li><a href="../pages/dancers.html" class="text-white/70 hover:text-white transition-colors">舞者</a></li>
                        <li><a href="../pages/testimonials.html" class="text-white/70 hover:text-white transition-colors">舞者心语</a></li>
                    </ul>
                </div>
                
                <div>
                    <h4 class="text-sm font-semibold mb-4">参与</h4>
                    <ul class="space-y-2 text-sm">
                        <li><a href="../index.html#contact" class="text-white/70 hover:text-white transition-colors">成为舞者</a></li>
                        <li><a href="../index.html#contact" class="hidden text-white/70 hover:text-white transition-colors">工作坊</a></li>
                        <li><a href="../index.html#contact" class="hidden text-white/70 hover:text-white transition-colors">合作</a></li>
                        <li><a href="../index.html#contact" class="hidden text-white/70 hover:text-white transition-colors">支持</a></li>
                    </ul>
                </div>
                
                <div>
                    <h4 class="text-sm font-semibold mb-4">社交</h4>
                    <div class="flex gap-4 relative">
                        <!-- 微信 -->
                        <div class="relative group">
                            <a href="https://mp.weixin.qq.com/s/iiSXm13SURaDznRt_jW4WQ" class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center hover:bg-accent text-white transition-colors">
                                <i class="fa fa-weixin"></i>
                            </a>
                            <div class="absolute bottom-full left-1/2 transform -translate-x-1/2 -translate-y-4 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 z-50">
                                <div class="bg-white p-4 rounded-lg shadow-xl" style="width: 140px;">
                                    <img src="../assets/wingdancetheare-wechat-qrcode.png" alt="微信二维码" style="width: 120px; height: 120px; object-fit: contain; display: block; margin: 0 auto;">
                                    <p class="text-xs text-center text-gray-600 mt-2">微信公众号</p>
                                </div>
                                <div class="absolute top-full left-1/2 transform -translate-x-1/2 w-0 h-0 border-l-4 border-r-4 border-t-4 border-l-transparent border-r-transparent border-t-white"></div>
                            </div>
                        </div>
                        
                        <!-- 微博 -->
                        <div class="hidden relative group">
                            <a href="#" class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center hover:bg-accent text-white transition-colors">
                                <i class="fa fa-weibo"></i>
                            </a>
                            <div class="absolute bottom-full left-1/2 transform -translate-x-1/2 -translate-y-4 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 z-50">
                                <div class="bg-white p-4 rounded-lg shadow-xl" style="width: 140px;">
                                    <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=Weibo%20QR%20code%20placeholder%20for%20Chinese%20dance%20group&image_size=square" alt="微博二维码" style="width: 120px; height: 120px; object-fit: contain; display: block; margin: 0 auto;">
                                    <p class="text-xs text-center text-gray-600 mt-2">扫码关注</p>
                                </div>
                                <div class="absolute top-full left-1/2 transform -translate-x-1/2 w-0 h-0 border-l-4 border-r-4 border-t-4 border-l-transparent border-r-transparent border-t-white"></div>
                            </div>
                        </div>
                        
                        <!-- B站 -->
                        <div class="relative group">
                            <a href="https://space.bilibili.com/1534780280" class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center hover:bg-accent text-white transition-colors">
                                <img src="../assets/icons/bilibili_icon.svg" alt="B站" class="w-6 h-6">
                            </a>
                            <div class="absolute bottom-full left-1/2 transform -translate-x-1/2 -translate-y-4 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 z-50">
                                <div class="bg-white p-4 rounded-lg shadow-xl" style="width: 140px;">
                                    <img src="../assets/bilibili-qrcode.jpg" alt="B站二维码" style="width: 120px; height: 120px; object-fit: contain; display: block; margin: 0 auto;">
                                    <p class="text-xs text-center text-gray-600 mt-2">扫码关注</p>
                                </div>
                                <div class="absolute top-full left-1/2 transform -translate-x-1/2 w-0 h-0 border-l-4 border-r-4 border-t-4 border-l-transparent border-r-transparent border-t-white"></div>
                            </div>
                        </div>
                        
                        <!-- 小红书 -->
                        <div class="relative group">
                            <a href="https://www.xiaohongshu.com/user/profile/64590f57000000001002bd2e" class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center hover:bg-accent text-white transition-colors">
                                <img src="../assets/icons/redbook.svg" alt="小红书" class="w-6 h-6">
                            </a>
                            <div class="absolute bottom-full left-1/2 transform -translate-x-1/2 -translate-y-4 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 z-50">
                                <div class="bg-white p-4 rounded-lg shadow-xl" style="width: 140px;">
                                    <img src="../assets/redbook-qrcode.jpg" alt="小红书二维码" style="width: 120px; height: 120px; object-fit: contain; display: block; margin: 0 auto;">
                                    <p class="text-xs text-center text-gray-600 mt-2">扫码关注</p>
                                </div>
                                <div class="absolute top-full left-1/2 transform -translate-x-1/2 w-0 h-0 border-l-4 border-r-4 border-t-4 border-l-transparent border-r-transparent border-t-white"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="border-t border-white/10 pt-8 text-center text-sm text-white/60">
                <p>© <span id="current-year">2025</span> Wing Dance Theatre. 保留所有权利。</p>
            </div>
        </div>
    </footer>

    <!-- JavaScript -->
    <script src="../js/main.js"></script>
    <script src="../js/gallery.js"></script>
</body>
</html>
